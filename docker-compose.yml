# ELD Trip Planner — production-style compose file for a single droplet.
#
# Usage:
#   cp .env.docker.example .env.docker
#   # edit values
#   docker compose --env-file .env.docker up -d --build
#
# Reachable at http://<droplet-ip>/

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eld}
      POSTGRES_USER: ${POSTGRES_USER:-eld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env.docker}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      DATABASE_URL: postgres://${POSTGRES_USER:-eld}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eld}
      NOMINATIM_URL: ${NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      OSRM_URL: ${OSRM_URL:-https://router.project-osrm.org}
      APP_USER_AGENT: ${APP_USER_AGENT:-ELDTripPlanner/1.0}
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: nginx proxies /api → backend, so an empty/relative base
        # works perfectly. Override if you split frontend/backend domains.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
